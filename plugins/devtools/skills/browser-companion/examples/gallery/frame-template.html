<!DOCTYPE html>
<!--
 ! Gallery-flavored frame template.
 !
 ! Tailwind CSS via CDN + Inter font for a polished, modern look. Designed for
 ! browsing variants/options in a sidebar layout. Pair with the sibling
 ! helper.js, which captures clicks on `.variant-btn[data-variant]` elements.
 !
 ! Adapted from internal-repos/tailwindplus/skills/tailwindplus-catalog/
 ! scripts/server/frame-template.html. The original references the paid
 ! @tailwindplus/elements package — removed in this neutralization since the
 ! example must work for anyone, not only TW+ license holders.
-->
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery preview</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['InterVariable', 'Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    :root { font-family: 'InterVariable', 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="h-full bg-white">
  <!-- FRAGMENT -->
</body>
</html>
