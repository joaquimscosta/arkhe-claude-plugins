<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>arkhe-preview</title>
  <style>
    /*
     * NEUTRAL FRAME TEMPLATE
     *
     * Minimal styling — OS-aware light/dark theming, a tiny header, and a
     * scrollable content area. No domain-specific UI (no indicator bars,
     * no variant sidebars, no multi-select chrome).
     *
     * Consumers that want a richer UI should ship their own frame template
     * (and matching helper) and point arkhe-preview at it via:
     *
     *   arkhe-preview start --frame-template <path> --helper <path>
     *
     * Required placeholders (use either; FRAGMENT is preferred):
     *   <!-- FRAGMENT -->   ← replaced with the latest HTML fragment
     *   <!-- CONTENT -->    ← legacy alias (superpowers compat)
     */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    :root {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --border: #d1d1d6;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --success: #34c759;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1d1d1f;
        --bg-secondary: #2d2d2f;
        --border: #424245;
        --text-primary: #f5f5f7;
        --text-secondary: #86868b;
        --accent: #0a84ff;
      }
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    .header {
      background: var(--bg-secondary);
      padding: 0.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .header .status {
      font-size: 0.7rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .header .status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
    }

    .main { flex: 1; overflow-y: auto; }
    #fragment { padding: 2rem; min-height: 100%; }
  </style>
</head>
<body>
  <div class="header">
    <h1>arkhe-preview</h1>
    <div class="status">Connected</div>
  </div>

  <div class="main">
    <div id="fragment">
      <!-- FRAGMENT -->
    </div>
  </div>
</body>
</html>
