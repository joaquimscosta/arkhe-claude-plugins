| spring-boot-web-api | `**/*Controller.java` |
| spring-boot-modulith | `**/module-info.java`, `**/spring.modulith.json` |
| spring-boot-security | `**/*Security*.java`, `**/*Config*.java` |
| spring-boot-observability | `**/actuator/**/*.java`, `**/*Health*.java` |
| spring-boot-testing | `**/test/**/*.java` |
| spring-boot-verify | `pom.xml`, `build.gradle*`, `**/application.{yml,yaml,properties}` |

---

## Critical Rules

1. **Never review skills with no matching files** ‚Äî Discovery determines relevance
2. **Always parallel execute** ‚Äî Phase 2 launches all agents in a single response
3. **80+ confidence only** ‚Äî Filter out lower-confidence findings
4. **Workers read skill docs first** ‚Äî Each reviewer reads SKILL.md before reviewing
5. **Report only** ‚Äî Never apply fixes; include copy-paste suggestions instead

